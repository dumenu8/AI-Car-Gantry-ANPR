<div class="min-h-screen bg-gray-900 text-gray-100 font-sans flex flex-col">
  <!-- Header / Navigation -->
  <header class="bg-gray-800 shadow-lg border-b border-gray-700">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
      <div class="flex justify-between h-16">
        <div class="flex">
          <div class="flex-shrink-0 flex items-center">
            <h1 class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-400 to-teal-400">
              AI Gantry ANPR
            </h1>
          </div>
          <nav class="hidden sm:ml-6 sm:flex sm:space-x-8">
            <a routerLink="/process" 
               routerLinkActive="border-teal-400 text-white"
               [routerLinkActiveOptions]="{exact: true}"
               class="border-transparent text-gray-300 hover:text-white hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors duration-200">
              Process Image
            </a>
            <a routerLink="/logs" 
               routerLinkActive="border-teal-400 text-white"
               class="border-transparent text-gray-300 hover:text-white hover:border-gray-300 inline-flex items-center px-1 pt-1 border-b-2 text-sm font-medium transition-colors duration-200">
              Vehicle Logs
            </a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <!-- Main Content Route Outlet -->
  <main class="flex-1 max-w-7xl w-full mx-auto p-4 sm:p-6 lg:p-8">
    <router-outlet></router-outlet>
  </main>
</div>
